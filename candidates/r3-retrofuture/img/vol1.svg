<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      .label{font-family:'Söhne Breit','Söhne',system-ui,sans-serif;font-weight:700;fill:#F1E8D4;letter-spacing:.05em}
      .tier{font-family:'Söhne Breit','Söhne',system-ui,sans-serif;font-weight:700;letter-spacing:.08em}
      .serif{font-family:'Tiempos Text',serif;font-style:italic}
      .mono{font-family:'Söhne Mono',monospace;letter-spacing:.12em}
    </style>
    <radialGradient id="cream" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#FBF7EE"/>
      <stop offset="100%" stop-color="#F1E8D4"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCBE7E"/>
      <stop offset="50%" stop-color="#C8A961"/>
      <stop offset="100%" stop-color="#A68947"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#cream)"/>

  <!-- Ambient circle shadow -->
  <ellipse cx="512" cy="560" rx="380" ry="28" fill="#2B2822" opacity="0.08"/>

  <!-- Outer chrome/brass ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#brass)" stroke-width="10"/>
  <circle cx="512" cy="512" r="370" fill="none" stroke="#F1E8D4" stroke-width="2"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="#8A7540" stroke-width="1"/>

  <!-- Six slices. Order clockwise from 12 o'clock: -->
  <!-- PETRI DISH (0°–60°), PROBE (60–120), FRAME (120–180), BEACHHEAD (180–240), LIGHTHOUSE (240–300), KILLER APP (300–360) -->
  <!-- Rotation frame: 0° = up (top). We draw starting from -90° (top) and rotate clockwise. -->

  <!-- Slice 1: PETRI DISH — atomic cream bg + teal -->
  <path d="M 512 512 L 512 152 A 360 360 0 0 1 823.77 332 Z" fill="#0E2F3D"/>
  <!-- Slice 2: PROBE — tangerine -->
  <path d="M 512 512 L 823.77 332 A 360 360 0 0 1 823.77 692 Z" fill="#E88A3C"/>
  <!-- Slice 3: FRAME — vermillion -->
  <path d="M 512 512 L 823.77 692 A 360 360 0 0 1 512 872 Z" fill="#D94E2E"/>
  <!-- Slice 4: BEACHHEAD — deep teal -->
  <path d="M 512 512 L 512 872 A 360 360 0 0 1 200.23 692 Z" fill="#0E2F3D"/>
  <!-- Slice 5: LIGHTHOUSE — champagne gold (muted) -->
  <path d="M 512 512 L 200.23 692 A 360 360 0 0 1 200.23 332 Z" fill="#C8A961"/>
  <!-- Slice 6: KILLER APP — tangerine (brighter) -->
  <path d="M 512 512 L 200.23 332 A 360 360 0 0 1 512 152 Z" fill="#E88A3C"/>

  <!-- Gold hairline spokes between slices -->
  <g stroke="url(#brass)" stroke-width="2" opacity="0.9">
    <line x1="512" y1="152" x2="512" y2="872"/>
    <line x1="200.23" y1="332" x2="823.77" y2="692"/>
    <line x1="200.23" y1="692" x2="823.77" y2="332"/>
  </g>

  <!-- Labels — placed at slice center-radii, rotated to sit on the arc -->
  <!-- Slice midpoints (angles from 12 o'clock, clockwise): 30°, 90°, 150°, 210°, 270°, 330° -->

  <!-- PETRI DISH — mid at 30° clockwise from top -->
  <g transform="translate(512 512) rotate(30) translate(0 -260) rotate(-30)">
    <text class="label" text-anchor="middle" font-size="30" fill="#F1E8D4">PETRI DISH</text>
    <text class="mono" text-anchor="middle" font-size="11" dy="22" fill="#F1E8D4" opacity="0.75">GET WEIRD</text>
  </g>
  <!-- PROBE — mid at 90° (right) -->
  <g transform="translate(512 512) rotate(90) translate(0 -260) rotate(-90)">
    <text class="label" text-anchor="middle" font-size="30" fill="#2B2822">PROBE</text>
    <text class="mono" text-anchor="middle" font-size="11" dy="22" fill="#2B2822" opacity="0.75">FALSIFIABLE</text>
  </g>
  <!-- FRAME — mid at 150° -->
  <g transform="translate(512 512) rotate(150) translate(0 -260) rotate(-150)">
    <text class="label" text-anchor="middle" font-size="30" fill="#F1E8D4">FRAME</text>
    <text class="mono" text-anchor="middle" font-size="11" dy="22" fill="#F1E8D4" opacity="0.85">DRAW THE EDGES</text>
  </g>
  <!-- BEACHHEAD — mid at 210° (bottom-left) -->
  <g transform="translate(512 512) rotate(210) translate(0 -260) rotate(-210)">
    <text class="label" text-anchor="middle" font-size="28" fill="#F1E8D4">BEACHHEAD</text>
    <text class="mono" text-anchor="middle" font-size="11" dy="22" fill="#F1E8D4" opacity="0.75">DOMINATE NICHE</text>
  </g>
  <!-- LIGHTHOUSE — mid at 270° (left) -->
  <g transform="translate(512 512) rotate(270) translate(0 -260) rotate(-270)">
    <text class="label" text-anchor="middle" font-size="28" fill="#2B2822">LIGHTHOUSE</text>
    <text class="mono" text-anchor="middle" font-size="11" dy="22" fill="#2B2822" opacity="0.75">SAFE HARBOR</text>
  </g>
  <!-- KILLER APP — mid at 330° (top-left) -->
  <g transform="translate(512 512) rotate(330) translate(0 -260) rotate(-330)">
    <text class="label" text-anchor="middle" font-size="28" fill="#2B2822">KILLER APP</text>
    <text class="mono" text-anchor="middle" font-size="11" dy="22" fill="#2B2822" opacity="0.75">NETWORK EFFECTS</text>
  </g>

  <!-- Center disc (three concentric rings: SER outer, BBP mid, EBU inner) -->
  <circle cx="512" cy="512" r="150" fill="url(#cream)" stroke="url(#brass)" stroke-width="4"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#F1E8D4" stroke-width="1"/>
  <circle cx="512" cy="512" r="110" fill="#FBF7EE" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="512" cy="512" r="72" fill="#F1E8D4" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="512" cy="512" r="38" fill="#E88A3C" stroke="url(#brass)" stroke-width="2"/>

  <!-- Ring labels (tiny caps, top of each ring) -->
  <text class="tier" text-anchor="middle" x="512" y="394" font-size="13" fill="#2B2822">SER</text>
  <text class="tier" text-anchor="middle" x="512" y="434" font-size="13" fill="#2B2822">BBP</text>
  <text class="tier" text-anchor="middle" x="512" y="480" font-size="13" fill="#2B2822">EBU</text>

  <!-- Atomic symbol at exact center (three orbits) -->
  <g transform="translate(512 512)" fill="none" stroke="#FBF7EE" stroke-width="1.5" opacity="0.9">
    <ellipse rx="20" ry="8" transform="rotate(0)"/>
    <ellipse rx="20" ry="8" transform="rotate(60)"/>
    <ellipse rx="20" ry="8" transform="rotate(120)"/>
    <circle r="3" fill="#FBF7EE" stroke="none"/>
  </g>

  <!-- Tangerine pointer needle — points at KILLER APP slice -->
  <g transform="translate(512 512) rotate(330)">
    <path d="M 0 -30 L -8 0 L 0 -340 L 8 0 Z" fill="#D94E2E" stroke="#8A3B22" stroke-width="1"/>
    <circle r="14" fill="url(#brass)" stroke="#8A7540" stroke-width="2"/>
    <circle r="5" fill="#2B2822"/>
  </g>

  <!-- Chart-wheel base rim tick marks (every 10°) -->
  <g stroke="#8A7540" stroke-width="1" opacity="0.4">
    <g id="ticks"></g>
  </g>

  <!-- Caption strip at bottom -->
  <g transform="translate(0 920)">
    <rect x="152" y="0" width="720" height="64" fill="#FBF7EE" stroke="url(#brass)" stroke-width="1"/>
    <text class="mono" text-anchor="middle" x="512" y="24" font-size="10" fill="#2B2822" opacity="0.7">VOL·I · SIX ARCHETYPES · THREE TIERS · NINE STEPS</text>
    <text class="serif" text-anchor="middle" x="512" y="50" font-size="18" fill="#0E2F3D">The shape of the bet — before you build it.</text>
  </g>

  <!-- Plate corner details (Wes Anderson retro-future accents) -->
  <g fill="#C8A961" opacity="0.7">
    <circle cx="100" cy="100" r="4"/>
    <circle cx="924" cy="100" r="4"/>
    <circle cx="100" cy="924" r="4"/>
    <circle cx="924" cy="924" r="4"/>
  </g>
</svg>
